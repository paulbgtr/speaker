<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>LoFi Speaker</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main>
            <h1>LoFi Speaker</h1>
            <p class="subtitle">Manage your radio stations</p>

            <section>
                <h2>Stations</h2>

                <ul id="stations" class="station-list"></ul>
            </section>

            <section>
                <h2>Add station</h2>
                <form>
                    <label for="name">Name</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Station name"
                    />

                    <label for="url">Stream URL</label>
                    <input
                        type="text"
                        id="url"
                        name="url"
                        placeholder="http://lofi-speaker.local/stations"
                    />

                    <button type="submit" id="submit-btn">Add station</button>
                    <button type="button" id="cancel-btn">
                        Cancel
                    </button>
                </form>
            </section>
        </main>

        <script src="script.js"></script>
    </body>
</html>
